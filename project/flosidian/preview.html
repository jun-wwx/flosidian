<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroNote - 你的第二大脑</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #1a1a1a; 
      color: #fff;
      min-height: 100vh;
    }
    
    /* Hero Section */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: 
        radial-gradient(ellipse at top, #1f1f2e 0%, transparent 50%),
        radial-gradient(ellipse at bottom right, #0d1117 0%, transparent 50%),
        linear-gradient(180deg, #0d1117 0%, #161b22 100%);
      position: relative;
      overflow: hidden;
    }
    
    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(88, 166, 255, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.08) 0%, transparent 40%);
      pointer-events: none;
    }
    
    /* Logo */
    .logo-container {
      position: relative;
      margin-bottom: 40px;
    }
    
    .logo {
      width: 140px;
      height: 140px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 
        0 0 0 1px rgba(255,255,255,0.1),
        0 20px 60px rgba(0,0,0,0.5),
        0 0 100px rgba(88, 166, 255, 0.1);
      animation: float 6s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    .logo::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 32px;
      background: linear-gradient(135deg, rgba(88, 166, 255, 0.3), rgba(139, 92, 246, 0.3));
      z-index: -1;
      opacity: 0.5;
    }
    
    .logo-icon {
      font-size: 64px;
      background: linear-gradient(135deg, #58a4ff, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .logo-glow {
      position: absolute;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(88, 166, 255, 0.2) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: -2;
      animation: pulse 4s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
    }
    
    .app-name {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 0%, #a0a0a0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .tagline {
      font-size: 20px;
      color: #8b949e;
      margin-bottom: 48px;
      font-weight: 400;
    }
    
    .tagline-cn {
      font-size: 16px;
      color: #6e7681;
      margin-bottom: 48px;
    }
    
    /* CTA Buttons */
    .cta-buttons {
      display: flex;
      gap: 16px;
      margin-bottom: 64px;
    }
    
    .btn {
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #58a4ff, #8b5cf6);
      color: #fff;
      border: none;
      box-shadow: 0 4px 20px rgba(88, 166, 255, 0.3);
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(88, 166, 255, 0.4);
    }
    
    .btn-secondary {
      background: rgba(255,255,255,0.05);
      color: #c9d1d9;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
    }
    
    /* Features */
    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      max-width: 900px;
      padding: 0 24px;
    }
    
    .feature {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 24px;
      text-align: left;
    }
    
    .feature-icon {
      font-size: 28px;
      margin-bottom: 12px;
    }
    
    .feature-title {
      font-size: 16px;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 8px;
    }
    
    .feature-desc {
      font-size: 14px;
      color: #8b949e;
      line-height: 1.5;
    }
    
    /* Footer */
    .footer {
      position: absolute;
      bottom: 24px;
      color: #484f58;
      font-size: 13px;
    }
    
    /* App View */
    .app { display: none; height: 100vh; }
    .app.active { display: flex; }
    .hero.hidden { display: none; }
    
    /* Sidebar */
    .sidebar { width: 250px; background: #252526; border-right: 1px solid #3c3c3c; display: flex; flex-direction: column; }
    .sidebar-header { padding: 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3c3c3c; }
    .sidebar-header h2 { font-size: 16px; font-weight: 600; }
    .sidebar-header button { width: 28px; height: 28px; border: none; background: #0e639c; color: #fff; border-radius: 4px; cursor: pointer; font-size: 18px; }
    .notes-list { flex: 1; overflow-y: auto; padding: 8px; }
    .note-item { padding: 8px 12px; margin-bottom: 4px; border-radius: 4px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .note-item:hover { background: #2a2d2e; }
    .note-item.active { background: #37373d; }
    .note-name { font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .delete-btn { opacity: 0; background: transparent; border: none; color: #f48771; cursor: pointer; font-size: 16px; padding: 2px 6px; }
    .note-item:hover .delete-btn { opacity: 1; }
    
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .toolbar { padding: 12px 16px; background: #252526; border-bottom: 1px solid #3c3c3c; display: flex; justify-content: space-between; align-items: center; }
    .note-title { font-size: 14px; font-weight: 500; }
    .toolbar button { padding: 6px 12px; background: #3c3c3c; border: none; color: #fff; border-radius: 4px; cursor: pointer; font-size: 12px; }
    
    .editor-container { flex: 1; display: flex; overflow: hidden; }
    .editor { flex: 1; overflow: auto; padding: 12px; border-right: 1px solid #3c3c3c; background: #1e1e1e; }
    .editor textarea { width: 100%; height: 100%; background: transparent; border: none; color: #d4d4d4; font-family: 'JetBrains Mono', monospace; font-size: 14px; resize: none; outline: none; line-height: 1.6; }
    .preview { flex: 1; overflow: auto; padding: 20px; background: #1e1e1e; line-height: 1.6; }
    .preview h1, .preview h2, .preview h3 { margin: 16px 0 8px; color: #fff; }
    .preview p { margin-bottom: 12px; color: #d4d4d4; }
    .preview code { background: #2d2d2d; padding: 2px 6px; border-radius: 3px; font-family: monospace; }
    .preview pre { background: #2d2d2d; padding: 12px; border-radius: 6px; overflow-x: auto; margin: 12px 0; }
    .wiki-link { color: #4fc1ff; text-decoration: none; cursor: pointer; }
    
    .backlinks { padding: 12px 16px; background: #252526; border-top: 1px solid #3c3c3c; }
    .backlinks h3 { font-size: 12px; color: #888; margin-bottom: 8px; text-transform: uppercase; }
    .backlink { display: inline-block; padding: 4px 8px; margin-right: 8px; background: #3c3c3c; border-radius: 4px; font-size: 12px; cursor: pointer; }
    
    .welcome-app { flex: 1; display: flex; align-items: center; justify-content: center; color: #888; flex-direction: column; }
    .welcome-app h2 { color: #fff; margin-bottom: 12px; }
    .welcome-app button { padding: 10px 24px; background: #0e639c; border: none; color: #fff; border-radius: 4px; cursor: pointer; }
    
    .dialog-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .dialog-overlay.active { display: flex; }
    .dialog { background: #252526; border: 1px solid #3c3c3c; border-radius: 8px; padding: 24px; width: 400px; }
    .dialog h3 { margin-bottom: 16px; }
    .dialog input { width: 100%; padding: 10px 12px; background: #3c3c3c; border: 1px solid #5c5c5c; color: #fff; border-radius: 4px; font-size: 14px; margin-bottom: 16px; }
    .dialog-buttons { display: flex; justify-content: flex-end; gap: 8px; }
    .dialog-buttons button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .dialog-buttons button:first-child { background: #3c3c3c; color: #fff; }
    .dialog-buttons button:last-child { background: #0e639c; color: #fff; }
    
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      z-index: 100;
    }
  </style>
</head>
<body>
  <!-- Hero Section -->
  <div class="hero" id="hero">
    <button class="back-btn" onclick="openApp()" style="position:absolute;top:20px;left:20px;">← 体验 Demo</button>
    
    <div class="logo-container">
      <div class="logo-glow"></div>
      <div class="logo">
        <span class="logo-icon">🧠</span>
      </div>
    </div>
    
    <h1 class="app-name">NeuroNote</h1>
    <p class="tagline">Your Second Brain, Locally Owned</p>
    <p class="tagline-cn">你的第二大脑，本地数据永无丢失</p>
    
    <div class="cta-buttons">
      <button class="btn btn-primary" onclick="openApp()">开始使用 →</button>
      <a href="https://github.com/jun-wwx/flosidian" target="_blank" class="btn btn-secondary">GitHub</a>
    </div>
    
    <div class="features">
      <div class="feature">
        <div class="feature-icon">📝</div>
        <div class="feature-title">双向链接</div>
        <div class="feature-desc">用 [[wiki-style]] 链接连接你的想法，构建个人知识图谱</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🔒</div>
        <div class="feature-title">本地优先</div>
        <div class="feature-desc">Markdown 文件存储在本地，数据完全归你所有</div>
      </div>
      <div class="feature">
        <div class="feature-icon">⚡</div>
        <div class="feature-title">轻量快速</div>
        <div class="feature-desc">基于 Tauri 构建，启动即用，无需等待</div>
      </div>
    </div>
    
    <div class="footer">
      v0.1.0 · Built with Tauri + React
    </div>
  </div>

  <!-- App Section -->
  <div class="app" id="app">
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>🧠 NeuroNote</h2>
        <button onclick="showNewNoteDialog()">+</button>
      </div>
      <div class="notes-list" id="notesList"></div>
    </div>

    <div class="main" id="mainContent">
      <div class="welcome-app">
        <h2>Welcome to NeuroNote</h2>
        <p style="margin-bottom:16px">选择一个笔记或创建新笔记开始</p>
        <button onclick="showNewNoteDialog()">创建新笔记</button>
      </div>
    </div>

    <div class="dialog-overlay" id="dialogOverlay" onclick="closeDialog(event)">
      <div class="dialog">
        <h3>新建笔记</h3>
        <input type="text" id="newNoteInput" placeholder="笔记名称" onkeydown="handleEnter(event)">
        <div class="dialog-buttons">
          <button onclick="closeDialogDirect()">取消</button>
          <button onclick="createNote()">创建</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Demo data
    let notes = [
      { name: '欢迎', content: '# 欢迎使用 NeuroNote\n\n这是你的第一篇笔记！🎉\n\n## 功能特点\n\n- **Markdown** 支持\n- **[[双向链接]]** 连接笔记\n- 自动保存\n\n试试创建 [[第二篇笔记]] 看看链接效果！' },
      { name: '第二篇笔记', content: '# 第二篇笔记\n\n这篇笔记从 [[欢迎]] 链接过来。\n\n双向链接让笔记不再是孤岛！' }
    ];
    let currentNote = null;
    let showPreview = true;

    function openApp() {
      document.getElementById('hero').classList.add('hidden');
      document.getElementById('app').classList.add('active');
      renderNotesList();
    }

    function renderNotesList() {
      const list = document.getElementById('notesList');
      list.innerHTML = notes.map(note => `
        <div class="note-item ${currentNote === note.name ? 'active' : ''}" onclick="selectNote('${note.name}')">
          <span class="note-name">${note.name}</span>
          <button class="delete-btn" onclick="deleteNote('${note.name}', event)">×</button>
        </div>
      `).join('');
    }

    function selectNote(name) {
      currentNote = name;
      renderNotesList();
      renderMain();
    }

    function renderMain() {
      const main = document.getElementById('mainContent');
      const note = notes.find(n => n.name === currentNote);
      
      if (!note) {
        main.innerHTML = `
          <div class="welcome-app">
            <h2>Welcome to NeuroNote</h2>
            <p style="margin-bottom:16px">选择一个笔记或创建新笔记开始</p>
            <button onclick="showNewNoteDialog()">创建新笔记</button>
          </div>`;
        return;
      }

      const backlinks = notes.filter(n => n.name !== note.name && n.content.includes(`[[${note.name}]]`));

      main.innerHTML = `
        <div class="toolbar">
          <span class="note-title">${note.name}</span>
          <button onclick="togglePreview()">${showPreview ? '隐藏预览' : '显示预览'}</button>
        </div>
        <div class="editor-container">
          <div class="editor">
            <textarea id="editor" oninput="updateContent(this.value)">${note.content}</textarea>
          </div>
          ${showPreview ? `<div class="preview" id="preview"></div>` : ''}
        </div>
        ${backlinks.length > 0 ? `
        <div class="backlinks">
          <h3>反向链接</h3>
          ${backlinks.map(n => `<span class="backlink" onclick="selectNote('${n.name}')">${n.name}</span>`).join('')}
        </div>` : ''}`;
      
      renderPreview();
    }

    function updateContent(content) {
      const note = notes.find(n => n.name === currentNote);
      if (note) {
        note.content = content;
        renderPreview();
      }
    }

    function renderPreview() {
      const preview = document.getElementById('preview');
      if (!preview) return;
      
      const note = notes.find(n => n.name === currentNote);
      if (!note) return;
      
      let html = note.content
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/^\- (.+)$/gm, '<li>$1</li>')
        .replace(/\[\[([^\]]+)\]\]/g, '<a href="#" class="wiki-link" onclick="selectNote(\'$1\')">$1</a>')
        .replace(/\n/g, '<br>');
      
      preview.innerHTML = html;
    }

    function togglePreview() {
      showPreview = !showPreview;
      renderMain();
    }

    function showNewNoteDialog() {
      document.getElementById('dialogOverlay').classList.add('active');
      document.getElementById('newNoteInput').focus();
    }

    function closeDialog(e) {
      if (e.target.id === 'dialogOverlay') closeDialogDirect();
    }

    function closeDialogDirect() {
      document.getElementById('dialogOverlay').classList.remove('active');
      document.getElementById('newNoteInput').value = '';
    }

    function handleEnter(e) { if (e.key === 'Enter') createNote(); }

    function createNote() {
      const name = document.getElementById('newNoteInput').value.trim();
      if (!name) return;
      if (notes.find(n => n.name === name)) { alert('笔记已存在！'); return; }
      notes.push({ name, content: `# ${name}\n\n` });
      currentNote = name;
      closeDialogDirect();
      renderNotesList();
      renderMain();
    }

    function deleteNote(name, e) {
      e.stopPropagation();
      if (!confirm(`删除 "${name}"？`)) return;
      notes = notes.filter(n => n.name !== name);
      if (currentNote === name) currentNote = null;
      renderNotesList();
      renderMain();
    }
  </script>
</body>
</html>
